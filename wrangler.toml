name = "menuz-cloud-0910"
main = "workers/menuz-worker.js"
compatibility_date = "2026-02-26"
workers_dev = true
routes = [
  { pattern = "menuz.omniaprod.pt/*", zone_name = "omniaprod.pt" }
]

[triggers]
crons = ["*/15 * * * *"]

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "omniaprod"
database_id = "ed0d2ea8-c99f-4603-b515-da6e72eddfd8"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "menuz-uploads"

[vars]
MESHY_AI_MODEL = "meshy-6"
MESHY_MAX_REFERENCE_IMAGES = "4"
TOKEN_TTL_MS = "86400000"
LOGIN_WINDOW_MS = "900000"
LOGIN_MAX_ATTEMPTS = "6"
LOGIN_LOCK_MS = "900000"
ORDER_WINDOW_MS = "300000"
ORDER_MAX_PER_WINDOW = "20"
AI_ACTION_WINDOW_MS = "60000"
AI_ACTION_MAX_PER_WINDOW = "12"
PUBLIC_EVENT_WINDOW_MS = "300000"
PUBLIC_EVENT_MAX_PER_WINDOW = "200"
TRANSLATE_WINDOW_MS = "60000"
TRANSLATE_MAX_PER_WINDOW = "20"
TRANSLATE_MAX_TEXTS = "80"
TRANSLATE_MAX_CHARS_PER_TEXT = "300"
TRANSLATE_MAX_TOTAL_CHARS = "6000"
QA_MIN_PUBLISH_SCORE = "70"
CAPTURE_MIN_START_FOOD = "6"
CAPTURE_MIN_START_GENERAL = "4"
CAPTURE_RECOMMENDED_FOOD = "20"
CAPTURE_RECOMMENDED_GENERAL = "12"
DEBUG_ERRORS = "0"
