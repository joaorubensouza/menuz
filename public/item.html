<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menuz AR - Visualizar prato</title>
    <meta
      name="description"
      content="Visualizacao AR de prato com ajuste de escala e retorno rapido ao cardapio digital."
    />
    <meta name="theme-color" content="#c95f2f" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Menuz AR - Visualizar prato" />
    <meta property="og:description" content="Abra o item em realidade aumentada e ajuste a escala." />
    <meta property="og:image" content="/assets/landing/hero-food.webp" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Menuz AR - Visualizar prato" />
    <meta name="twitter:description" content="Abra o item em realidade aumentada e ajuste a escala." />
    <meta name="twitter:image" content="/assets/landing/hero-food.webp" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" id="item-canonical" href="/item.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="/site.css" />
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
  <body class="site site-item">
    <a class="skip-link" href="#item-main">Pular para o conteudo</a>
    <div class="container">
      <nav class="nav">
        <div class="brand">Menuz <span>AR MENU</span></div>
        <div class="row">
          <a class="btn btn-outline" id="back-link" href="/">Voltar ao cardapio</a>
        </div>
      </nav>

      <section class="section" id="item-main">
        <div class="section-title">
          <h2>Visualizacao AR</h2>
          <span class="badge">Item</span>
        </div>
        <div class="viewer-grid">
          <div class="viewer">
            <model-viewer
              id="modelViewer"
              src=""
              ios-src=""
              ar
              ar-modes="scene-viewer quick-look webxr"
              camera-controls
              touch-action="pan-y"
              poster=""
              shadow-intensity="1"
              exposure="0.9"
              loading="eager"
              reveal="auto"
              ar-scale="fixed"
              ar-placement="floor"
              interaction-prompt="auto"
              environment-image="neutral"
              min-camera-orbit="auto auto 60%"
              max-camera-orbit="auto auto 180%"
              camera-orbit="0deg 75deg 115%"
            ></model-viewer>
            <div class="row">
              <button class="btn" id="arButton" type="button">Ver em AR</button>
              <a class="btn btn-outline hidden" id="iosQuickLookLink" href="#" rel="ar">Abrir no iPhone</a>
            </div>
            <div class="scale-controls hidden" id="scaleControls">
              <div class="scale-head">
                <strong>Escala do prato</strong>
                <span id="scaleValue">100%</span>
              </div>
              <div class="scale-row">
                <button class="btn btn-outline scale-btn" id="scaleDown" type="button" aria-label="Diminuir escala">
                  -
                </button>
                <input
                  id="scaleRange"
                  class="scale-range"
                  type="range"
                  min="50"
                  max="200"
                  step="5"
                  value="100"
                  aria-label="Ajustar escala do prato"
                />
                <button class="btn btn-outline scale-btn" id="scaleUp" type="button" aria-label="Aumentar escala">
                  +
                </button>
                <button class="btn btn-outline" id="scaleReset" type="button">Resetar</button>
              </div>
            </div>
            <div class="footer-note" id="arHint">Use uma superficie plana.</div>
            <div class="footer-note" id="arFallback"></div>
          </div>
          <aside class="panel">
            <div class="tag" id="item-restaurant">Restaurante</div>
            <h3 id="item-name">Prato</h3>
            <p class="muted" id="item-desc"></p>
            <div class="row" style="margin-top: 12px;">
              <div class="price" id="item-price"></div>
              <span class="badge">AR</span>
            </div>
          </aside>
        </div>
      </section>
    </div>

    <script src="/ar.js"></script>
  </body>
</html>
