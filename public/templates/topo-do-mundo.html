<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cardapio digital</title>
    <meta
      id="meta-description"
      name="description"
      content="Cardapio digital integrado com pedido na mesa, experiencia AR e navegacao otimizada para mobile."
    />
    <meta name="theme-color" content="#c95f2f" />
    <meta property="og:type" content="website" />
    <meta property="og:title" id="og-title" content="Cardapio digital" />
    <meta property="og:description" id="og-description" content="Cardapio digital com pedido rapido e experiencia AR." />
    <meta property="og:image" id="og-image" content="/assets/landing/hero-restaurant.webp" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twitter-title" content="Cardapio digital" />
    <meta name="twitter:description" id="twitter-description" content="Cardapio digital com pedido rapido e experiencia AR." />
    <meta name="twitter:image" id="twitter-image" content="/assets/landing/hero-restaurant.webp" />
    <link rel="canonical" id="canonical-link" href="/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link rel="stylesheet" href="/topo.css" />
    <script type="application/ld+json" id="restaurant-jsonld">{}</script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Pular para o conteudo</a>
    <noscript>
      <p class="noscript-warning">Ative o JavaScript para usar o cardapio e enviar pedidos.</p>
    </noscript>
    <header class="topbar">
      <button class="icon-btn" id="menu-toggle" type="button" aria-label="Abrir menu" aria-controls="side-drawer" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="logo-wrap">
        <img class="brand-logo hidden" id="brand-logo" alt="Logo do restaurante" />
        <p class="logo-title" id="brand-title">Cardapio</p>
        <p class="logo-sub" id="brand-sub">menu</p>
      </div>
      <button class="search-btn" id="search-toggle" type="button" aria-label="Buscar" aria-controls="search-wrap" aria-expanded="false">
        &#9906;
      </button>
    </header>

    <section class="search-wrap hidden" id="search-wrap">
      <label class="sr-only" for="search-input">Buscar prato</label>
      <input id="search-input" type="search" placeholder="Buscar prato" autocomplete="off" />
    </section>

    <section class="hero">
      <button class="hero-nav prev" id="hero-prev" type="button" aria-label="Anterior">
        &#10094;
      </button>
      <div class="hero-track" id="hero-track"></div>
      <button class="hero-nav next" id="hero-next" type="button" aria-label="Proximo">
        &#10095;
      </button>
    </section>

    <section class="hero-meta">
      <div class="hero-dots" id="hero-dots"></div>
      <div class="title-row">
        <h1 id="restaurant-name">Carregando...</h1>
        <div class="title-tools">
          <button class="icon-text" id="share-toggle" type="button" aria-label="Compartilhar link">&#8901;</button>
        </div>
      </div>
      <p id="restaurant-desc"></p>
    </section>

    <section class="status-strip">
      <span class="status-pill" id="network-pill">Online</span>
      <span class="status-pill tech hidden" id="tech-clock">--:--</span>
      <span class="status-pill tech hidden" id="tech-latency">Latencia --</span>
      <button class="status-btn hidden" id="install-app" type="button">Instalar</button>
      <button class="status-btn hidden" id="voice-search" type="button">Voz</button>
      <button class="status-btn" id="command-palette-toggle" type="button">Comandos</button>
      <button class="status-btn" id="tech-mode-toggle" type="button">Tech</button>
      <button class="status-btn" id="compact-toggle" type="button">Compacto</button>
      <button class="status-btn" id="favorites-toggle" type="button">Favoritos</button>
    </section>

    <section class="quick-actions hidden" id="quick-actions"></section>
    <section class="ai-rail hidden" id="ai-rail"></section>

    <main class="page" id="main-content">
      <section class="mode-strip" id="mode-strip"></section>

      <section class="tabs" id="category-list"></section>

      <section class="menu-sections" id="menu-list"></section>
      <section class="empty-state hidden" id="empty-state">
        Nenhum item.
      </section>

      <section class="mini-form-grid" id="engagement-forms">
        <form class="mini-form hidden" id="reservation-form">
          <div class="mini-form-head">
            <h2>Reserva</h2>
            <span id="reservation-status" class="muted"></span>
          </div>
          <div class="mini-fields">
            <input id="reservation-name" type="text" placeholder="Nome" autocomplete="name" />
            <input id="reservation-phone" type="tel" placeholder="Telefone" autocomplete="tel" />
            <input id="reservation-guests" type="number" min="1" max="20" value="2" placeholder="Pessoas" />
            <input id="reservation-date" type="date" />
            <input id="reservation-time" type="time" />
            <button type="submit">Enviar reserva</button>
          </div>
        </form>

        <form class="mini-form hidden" id="lead-form">
          <div class="mini-form-head">
            <h2>Contato</h2>
            <span id="lead-status" class="muted"></span>
          </div>
          <div class="mini-fields mini-fields-lead">
            <input id="lead-name" type="text" placeholder="Nome" autocomplete="name" />
            <input id="lead-email" type="email" placeholder="Email" autocomplete="email" />
            <input id="lead-phone" type="tel" placeholder="Telefone" autocomplete="tel" />
            <button type="submit">Receber novidades</button>
          </div>
        </form>

        <form class="mini-form hidden" id="waitlist-form">
          <div class="mini-form-head">
            <h2>Fila</h2>
            <span id="waitlist-status" class="muted"></span>
          </div>
          <div class="mini-fields">
            <input id="waitlist-name" type="text" placeholder="Nome" autocomplete="name" />
            <input id="waitlist-phone" type="tel" placeholder="Telefone" autocomplete="tel" />
            <input id="waitlist-guests" type="number" min="1" max="20" value="2" placeholder="Pessoas" />
            <input id="waitlist-eta" type="number" min="0" max="300" step="5" placeholder="Espera (min)" />
            <button type="submit">Entrar na fila</button>
          </div>
        </form>

        <form class="mini-form hidden" id="feedback-form">
          <div class="mini-form-head">
            <h2>Feedback</h2>
            <span id="feedback-status" class="muted"></span>
          </div>
          <div class="mini-fields">
            <input id="feedback-name" type="text" placeholder="Nome" autocomplete="name" />
            <input id="feedback-email" type="email" placeholder="Email" autocomplete="email" />
            <select id="feedback-rating">
              <option value="5">Nota 5</option>
              <option value="4">Nota 4</option>
              <option value="3">Nota 3</option>
              <option value="2">Nota 2</option>
              <option value="1">Nota 1</option>
            </select>
            <textarea id="feedback-comment" rows="2" placeholder="Comentario curto"></textarea>
            <button type="submit">Enviar feedback</button>
          </div>
        </form>
      </section>
    </main>

    <button class="cart-fab hidden" id="cart-button">Pedido</button>

    <div class="cart-modal hidden" id="cart-modal" aria-hidden="true">
      <div class="cart-panel">
        <div class="cart-head">
          <div>
            <p class="brand small">Mesa</p>
            <h2>Pedido</h2>
          </div>
          <button class="close-btn" id="cart-close">Fechar</button>
        </div>

        <div class="cart-items" id="cart-items"></div>

        <div class="cart-foot">
          <div class="cart-total" id="cart-total"></div>
          <input id="table-input" type="text" inputmode="numeric" pattern="[a-zA-Z0-9\\-_.#]{1,32}" placeholder="Mesa" autocomplete="off" />
          <div class="row">
            <button class="btn btn-outline" id="cart-clear" type="button">Limpar</button>
            <button id="cart-submit">Enviar pedido</button>
          </div>
          <p id="cart-message" role="status" aria-live="polite"></p>
        </div>
      </div>
    </div>

    <div class="command-modal hidden" id="command-modal" aria-hidden="true">
      <div class="command-card">
        <div class="command-head">
          <h3>Comandos</h3>
          <button class="close-btn" id="command-close" type="button">Fechar</button>
        </div>
        <input id="command-input" type="search" placeholder="Digite um comando ou acao" autocomplete="off" />
        <div class="command-list" id="command-list"></div>
      </div>
    </div>

    <div class="lang-modal hidden" id="lang-modal" aria-hidden="true">
      <div class="lang-card">
        <div class="lang-head">
          <h3 id="lang-title">Idioma</h3>
          <button class="close-btn" id="lang-close" type="button">Fechar</button>
        </div>
        <div id="lang-list"></div>
      </div>
    </div>

    <div class="side-overlay hidden" id="side-overlay" aria-hidden="true"></div>
    <aside class="side-drawer" id="side-drawer" aria-hidden="true">
      <div class="drawer-head">
        <button class="drawer-lang" id="drawer-lang" type="button" aria-label="Trocar idioma">
          Portugues do Brasil
        </button>
        <button class="close-btn" id="drawer-close" type="button">Fechar</button>
      </div>
      <div class="drawer-brand">
        <img class="brand-logo hidden" id="drawer-brand-logo" alt="Logo do restaurante" />
        <p class="logo-title" id="drawer-brand-title">Cardapio</p>
        <p class="logo-sub" id="drawer-brand-sub">menu</p>
      </div>
      <ul class="drawer-info" id="drawer-info"></ul>
    </aside>

    <button class="back-top hidden" id="back-top" type="button" aria-label="Voltar ao topo">
      Topo
    </button>
    <div class="sr-live" id="sr-live" aria-live="polite" aria-atomic="true"></div>
    <script src="/topo.js" defer></script>
  </body>
</html>
